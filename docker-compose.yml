version: '3.8'

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server","--appendonly","yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  subscription-service-1:
    build: .
    environment:
      - REDIS_ADDR=redis:6379
      - INSTANCE_ID=svc-1
      - PORT=8080
    networks:
      - app-network

  subscription-service-2:
    build: .
    environment:
      - REDIS_ADDR=redis:6379
      - INSTANCE_ID=svc-2
      - PORT=8080
    networks:
      - app-network

  subscription-service-3:
    build: .
    environment:
      - REDIS_ADDR=redis:6379
      - INSTANCE_ID=svc-3
      - PORT=8080
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - subscription-service-1
      - subscription-service-2
      - subscription-service-3
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
